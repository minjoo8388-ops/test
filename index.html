<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팀원 추천 서비스</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(80, 100, 220, 0.1);
    }

    h1 {
      font-size: 22px;
      color: #3a3af4;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }

    /* 진행바 */
    .progress-wrap { margin-bottom: 28px; }
    .progress-label { font-size: 12px; color: #aaa; margin-bottom: 6px; }
    .progress-bar {
      height: 6px;
      background: #e8eaff;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #3a3af4;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* 스텝 */
    .step { display: none; }
    .step.active { display: block; }

    .step-title {
      font-size: 16px;
      font-weight: 600;
      color: #222;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    /* 선택지 버튼 */
    .options { display: flex; flex-direction: column; gap: 10px; }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 2px solid #e8eaff;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      font-size: 14px;
      color: #333;
      text-align: left;
      transition: all 0.2s;
    }

    .option-btn:hover { border-color: #3a3af4; background: #f5f5ff; }

    .option-btn.selected {
      border-color: #3a3af4;
      background: #f0f0ff;
      color: #3a3af4;
      font-weight: 600;
    }

    .option-key {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #e8eaff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #3a3af4;
      flex-shrink: 0;
    }

    .option-btn.selected .option-key { background: #3a3af4; color: white; }

    /* 태그 선택 */
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }

    .tag {
      padding: 8px 14px;
      border: 2px solid #e8eaff;
      border-radius: 99px;
      font-size: 13px;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
    }

    .tag:hover { border-color: #3a3af4; color: #3a3af4; }
    .tag.selected { border-color: #3a3af4; background: #3a3af4; color: white; }

    /* 팀 크기 슬라이더 */
    .team-size-wrap { text-align: center; margin: 16px 0; }
    .team-size-wrap input[type=range] { width: 100%; accent-color: #3a3af4; }
    .team-size-value {
      font-size: 36px;
      font-weight: 700;
      color: #3a3af4;
      margin-top: 8px;
    }
    .team-size-label { font-size: 13px; color: #aaa; }

    /* 버튼 */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #3a3af4;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
      transition: background 0.2s;
    }

    .btn:hover { background: #2828d0; }
    .btn:disabled { background: #c0c4f4; cursor: not-allowed; }

    /* 결과 */
    .result-badge {
      display: inline-block;
      padding: 8px 20px;
      background: #f0f0ff;
      border-radius: 99px;
      font-size: 18px;
      font-weight: 700;
      color: #3a3af4;
      margin-bottom: 20px;
    }

    .member-list { display: flex; flex-direction: column; gap: 12px; }

    .member-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid #e8eaff;
      border-radius: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #e8eaff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .member-info { flex: 1; }
    .member-name { font-weight: 600; font-size: 15px; color: #222; }
    .member-personality { font-size: 12px; color: #3a3af4; margin-top: 2px; }
    .member-stack { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }

    .stack-tag {
      padding: 2px 8px;
      background: #f5f5ff;
      border-radius: 99px;
      font-size: 11px;
      color: #555;
    }

    .restart-btn {
      width: 100%;
      padding: 12px;
      border: 2px solid #3a3af4;
      border-radius: 12px;
      background: white;
      color: #3a3af4;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.2s;
    }

    .restart-btn:hover { background: #f0f0ff; }

    .loading { text-align: center; padding: 30px; color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
<div class="card">
  <h1>팀원 추천 서비스</h1>
  <p class="subtitle">설문을 통해 나의 성향을 파악하고 최적의 팀원을 추천받으세요.</p>

  <div class="progress-wrap">
    <div class="progress-label" id="progressLabel">1 / 7 단계</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:14%"></div></div>
  </div>

  <!-- 스텝 1~5: 설문 -->
  <div id="surveySteps"></div>

  <!-- 스텝 6: 기술 스택 -->
  <div class="step" id="step-tech">
    <div class="step-title">사용 가능한 기술 스택을 선택하세요. (복수 선택)</div>
    <div class="tags" id="techTags">
      <div class="tag" data-value="JavaScript">JavaScript</div>
      <div class="tag" data-value="TypeScript">TypeScript</div>
      <div class="tag" data-value="React">React</div>
      <div class="tag" data-value="Vue.js">Vue.js</div>
      <div class="tag" data-value="Node.js">Node.js</div>
      <div class="tag" data-value="Python">Python</div>
      <div class="tag" data-value="Django">Django</div>
      <div class="tag" data-value="Java">Java</div>
      <div class="tag" data-value="Spring">Spring</div>
      <div class="tag" data-value="Go">Go</div>
      <div class="tag" data-value="Swift">Swift</div>
      <div class="tag" data-value="Kotlin">Kotlin</div>
      <div class="tag" data-value="Docker">Docker</div>
      <div class="tag" data-value="AWS">AWS</div>
      <div class="tag" data-value="GraphQL">GraphQL</div>
    </div>
    <button class="btn" id="techNextBtn" disabled>다음</button>
  </div>

  <!-- 스텝 7: 팀 크기 -->
  <div class="step" id="step-size">
    <div class="step-title">원하는 팀 크기를 선택하세요. (본인 포함)</div>
    <div class="team-size-wrap">
      <input type="range" min="2" max="8" value="4" id="teamSizeRange" />
      <div class="team-size-value" id="teamSizeValue">4명</div>
      <div class="team-size-label">팀원 <span id="recommendCount">3</span>명을 추천받습니다.</div>
    </div>
    <button class="btn" id="submitBtn">추천받기</button>
  </div>

  <!-- 결과 -->
  <div class="step" id="step-result">
    <div id="resultContent"></div>
    <button class="restart-btn" onclick="restart()">다시 하기</button>
  </div>
</div>

<script>
  let questions = [];
  let answers = [];
  let selectedTech = [];
  let currentStep = 0; // 0~4: survey, 5: tech, 6: size, 7: result
  const TOTAL_STEPS = 7;

  const avatars = ['🧑‍💻', '👩‍💻', '🧑‍🎨', '👩‍🔬', '🧑‍🚀', '👩‍💼', '🧑‍🔧', '👩‍🎤'];

  async function init() {
    const res = await fetch('/api/survey');
    const data = await res.json();
    questions = data.questions;
    renderSurveySteps();
    showStep(0);
  }

  function renderSurveySteps() {
    const container = document.getElementById('surveySteps');
    questions.forEach((q, i) => {
      const div = document.createElement('div');
      div.className = 'step';
      div.id = `step-survey-${i}`;
      div.innerHTML = `
        <div class="step-title">Q${q.id}. ${q.question}</div>
        <div class="options">
          ${q.options.map(o => `
            <button class="option-btn" data-step="${i}" data-key="${o.key}">
              <span class="option-key">${o.key.toUpperCase()}</span>
              ${o.text}
            </button>
          `).join('')}
        </div>
      `;
      container.appendChild(div);
    });

    document.addEventListener('click', e => {
      const btn = e.target.closest('.option-btn');
      if (!btn) return;
      const step = parseInt(btn.dataset.step);
      const key = btn.dataset.key;
      answers[step] = key;

      document.querySelectorAll(`#step-survey-${step} .option-btn`).forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');

      setTimeout(() => showStep(step + 1), 300);
    });
  }

  function showStep(index) {
    currentStep = index;
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));

    if (index < questions.length) {
      document.getElementById(`step-survey-${index}`).classList.add('active');
    } else if (index === questions.length) {
      document.getElementById('step-tech').classList.add('active');
    } else if (index === questions.length + 1) {
      document.getElementById('step-size').classList.add('active');
    } else {
      document.getElementById('step-result').classList.add('active');
    }

    updateProgress();
  }

  function updateProgress() {
    const stepNum = currentStep + 1;
    const pct = Math.round((stepNum / TOTAL_STEPS) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${Math.min(stepNum, TOTAL_STEPS)} / ${TOTAL_STEPS} 단계`;
  }

  // 기술 스택 선택
  document.getElementById('techTags').addEventListener('click', e => {
    const tag = e.target.closest('.tag');
    if (!tag) return;
    const val = tag.dataset.value;
    if (selectedTech.includes(val)) {
      selectedTech = selectedTech.filter(t => t !== val);
      tag.classList.remove('selected');
    } else {
      selectedTech.push(val);
      tag.classList.add('selected');
    }
    document.getElementById('techNextBtn').disabled = selectedTech.length === 0;
  });

  document.getElementById('techNextBtn').addEventListener('click', () => showStep(currentStep + 1));

  // 팀 크기 슬라이더
  document.getElementById('teamSizeRange').addEventListener('input', e => {
    const size = parseInt(e.target.value);
    document.getElementById('teamSizeValue').textContent = size + '명';
    document.getElementById('recommendCount').textContent = size - 1;
  });

  // 추천 요청
  document.getElementById('submitBtn').addEventListener('click', async () => {
    const teamSize = parseInt(document.getElementById('teamSizeRange').value);
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = '분석 중...';

    try {
      const res = await fetch('/api/teams/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answers, techStack: selectedTech, teamSize }),
      });
      const data = await res.json();
      renderResult(data);
      showStep(TOTAL_STEPS);
    } catch (err) {
      alert('오류가 발생했습니다. 다시 시도해주세요.');
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = '추천받기';
    }
  });

  function renderResult(data) {
    const container = document.getElementById('resultContent');
    container.innerHTML = `
      <div style="margin-bottom:8px; font-size:13px; color:#888;">나의 성향</div>
      <div class="result-badge">${data.myPersonality}</div>
      <div style="font-size:14px; color:#555; margin-bottom:20px;">${data.message}</div>
      <div class="member-list">
        ${data.recommendedMembers.map((m, i) => `
          <div class="member-card">
            <div class="avatar">${avatars[i % avatars.length]}</div>
            <div class="member-info">
              <div class="member-name">${m.name}</div>
              <div class="member-personality">${m.personality}</div>
              <div class="member-stack">
                ${m.techStack.map(t => `<span class="stack-tag">${t}</span>`).join('')}
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function restart() {
    answers = [];
    selectedTech = [];
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('selected'));
    document.getElementById('techNextBtn').disabled = true;
    document.getElementById('teamSizeRange').value = 4;
    document.getElementById('teamSizeValue').textContent = '4명';
    document.getElementById('recommendCount').textContent = '3';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = '추천받기';
    showStep(0);
  }

  init();
</script>
</body>
</html>
